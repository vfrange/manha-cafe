<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Recorte ✂</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700;900&family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box}
body{margin:0;min-height:100vh;background:#FFF8EC;font-family:'DM Sans',system-ui,sans-serif;display:flex;align-items:center;justify-content:center;padding:24px;color:#0A0A0A;transition:opacity .8s ease-out}
body.fadeout{opacity:0}
.wrap{width:100%;max-width:480px}

/* TOAST (news_pos / news_neg / topic_undone) */
.toast{background:#FFF;border:2px solid #0A0A0A;box-shadow:6px 6px 0 #0A0A0A;padding:28px;text-align:center;animation:pop .3s ease-out}
.toast .icon{width:60px;height:60px;margin:0 auto 16px;border:2px solid #0A0A0A;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:28px;box-shadow:4px 4px 0 #0A0A0A}
.toast .icon.up{background:#13A064;color:#FFF}
.toast .icon.down{background:#FF5A1F;color:#FFF}
.toast .icon.undo{background:#FFD60A;color:#0A0A0A}
.toast h1{font-family:'Fraunces',serif;font-weight:900;font-size:24px;letter-spacing:-.02em;margin:0 0 8px 0}
.toast p{font-size:14px;color:#4A4A4A;line-height:1.4;margin:0}
.toast p strong{color:#0A0A0A}

/* CARD GRANDE (topic_paused) */
.card{background:#FFF;border:2px solid #0A0A0A;box-shadow:8px 8px 0 #0A0A0A;padding:40px;text-align:center;animation:pop .3s ease-out}
.card .icon{width:80px;height:80px;margin:0 auto 24px;background:#FF5A1F;border:2px solid #0A0A0A;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:40px;color:#FFF;box-shadow:6px 6px 0 #0A0A0A}
.card h1{font-family:'Fraunces',serif;font-weight:900;font-size:32px;letter-spacing:-.02em;margin:0 0 14px 0}
.card .desc{font-size:16px;color:#4A4A4A;line-height:1.5;margin:0 0 28px 0}
.card .desc strong{color:#0A0A0A}
.actions{display:flex;flex-direction:column;gap:12px;align-items:center}
.btn-undo{display:inline-flex;align-items:center;gap:8px;background:#0A0A0A;color:#FFF;border:2px solid #0A0A0A;padding:14px 28px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:700;text-decoration:none;cursor:pointer;box-shadow:4px 4px 0 #FF5A1F;transition:transform .1s,box-shadow .1s}
.btn-undo:hover{transform:translate(-2px,-2px);box-shadow:6px 6px 0 #FF5A1F}
.btn-undo:active{transform:translate(2px,2px);box-shadow:2px 2px 0 #FF5A1F}
.countdown{font-size:12px;color:#8A8A85;font-weight:600}
.countdown strong{color:#0A0A0A;font-variant-numeric:tabular-nums}

.foot{text-align:center;margin-top:24px;font-size:12px;color:#8A8A85}
.foot strong{color:#0A0A0A}

@keyframes pop{from{transform:scale(.95);opacity:0}to{transform:scale(1);opacity:1}}
</style>
</head>
<body>
<div class="wrap" id="wrap"></div>

<script>
(function(){
  const params = new URLSearchParams(window.location.search);
  const kind = params.get('kind') || 'unknown';
  const label = params.get('label') || '';
  const undoUrl = params.get('undoUrl') || '';
  const wrap = document.getElementById('wrap');

  function escapeHtml(s){
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  // Toast com countdown (news_pos, news_neg, topic_undone) -> 3s ou 4s
  function renderToast(opts){
    const totalSec = opts.totalSec || 3;
    const fadeStartMs = (totalSec - 0.8) * 1000;
    const closeMs = totalSec * 1000;

    wrap.innerHTML = `
      <div class="toast">
        <div class="icon ${opts.iconClass}">${opts.iconText}</div>
        <h1>${escapeHtml(opts.title)}</h1>
        <p>${opts.html}</p>
      </div>
      <div class="foot"><strong>Recorte ✂</strong> &middot; sua manhã aprende com você</div>
    `;
    setTimeout(() => document.body.classList.add('fadeout'), fadeStartMs);
    setTimeout(() => { try { window.close(); } catch(e) {} }, closeMs);
  }

  // Card grande (topic_paused) com botão Desfazer + countdown 4s
  function renderCard(opts){
    const totalSec = 4;
    const fadeStartMs = (totalSec - 0.8) * 1000;
    const closeMs = totalSec * 1000;

    wrap.innerHTML = `
      <div class="card">
        <div class="icon">👎</div>
        <h1>Tema pausado.</h1>
        <p class="desc">Você não vai ver <strong>"${escapeHtml(label)}"</strong> nos próximos 7 dias.</p>
        <div class="actions">
          ${opts.undoUrl ? `<a class="btn-undo" href="${escapeHtml(opts.undoUrl)}">↶ Desfazer</a>` : ''}
          <div class="countdown">Fecha em <strong id="cd">${totalSec}</strong>s</div>
        </div>
      </div>
      <div class="foot"><strong>Recorte ✂</strong> &middot; sua manhã aprende com você</div>
    `;
    let n = totalSec;
    const cd = document.getElementById('cd');
    const interval = setInterval(() => {
      n--;
      if (cd) cd.textContent = n;
      if (n <= 0) clearInterval(interval);
    }, 1000);
    setTimeout(() => document.body.classList.add('fadeout'), fadeStartMs);
    setTimeout(() => { try { window.close(); } catch(e) {} }, closeMs);
  }

  switch(kind) {
    case 'news_pos':
      renderToast({
        iconClass: 'up',
        iconText: '👍',
        title: 'Anotado!',
        html: 'Mais coisas como essa.',
        totalSec: 3
      });
      break;
    case 'news_neg':
      renderToast({
        iconClass: 'down',
        iconText: '👎',
        title: 'Anotado!',
        html: 'Menos coisas como essa.',
        totalSec: 3
      });
      break;
    case 'topic_paused':
      renderCard({ undoUrl: undoUrl });
      break;
    case 'topic_undone':
      renderToast({
        iconClass: 'undo',
        iconText: '↶',
        title: 'Pause cancelado.',
        html: `<strong>"${escapeHtml(label)}"</strong> volta a aparecer no próximo email.`,
        totalSec: 4
      });
      break;
    default:
      wrap.innerHTML = `
        <div class="card">
          <div class="icon" style="background:#8A8A85">?</div>
          <h1>Hmm…</h1>
          <p class="desc">Não conseguimos identificar esta ação. Talvez o link tenha expirado.</p>
        </div>
        <div class="foot"><strong>Recorte ✂</strong> &middot; <a href="https://recorte.news" style="color:#0A0A0A">recorte.news</a></div>
      `;
  }
})();
</script>
</body>
</html>
