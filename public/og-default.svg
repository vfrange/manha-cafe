<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F2F0E6"/>
      <stop offset="100%" stop-color="#E8E5D8"/>
    </linearGradient>
    <linearGradient id="stripe" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#9FE5C8"/>
      <stop offset="33%" stop-color="#9FE5C8"/>
      <stop offset="33%" stop-color="#1A1A1A"/>
      <stop offset="66%" stop-color="#1A1A1A"/>
      <stop offset="66%" stop-color="#FFD60A"/>
      <stop offset="100%" stop-color="#FFD60A"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Top stripe -->
  <rect width="1200" height="14" fill="url(#stripe)"/>

  <!-- Brand: Recorte (text-anchor=end pra ancorar pelo lado direito, gap calculado de ~60px) -->
  <!-- Texto termina em x=760, começa em x=206 (554px de largura) -->
  <text x="760" y="245" text-anchor="end"
        font-family="'Switzer', 'Poppins', 'Inter', 'Helvetica Neue', system-ui, sans-serif"
        font-size="140" font-weight="900"
        letter-spacing="-1" fill="#1A1A1A">Recorte</text>

  <!-- Tesoura HORIZONTAL — olho esquerdo em x=820 (gap=60px do "e") -->
  <g transform="translate(870, 200)" stroke="#0A6E50" stroke-width="14" stroke-linecap="round" fill="none">
    <!-- Lâmina superior: olho superior → ponta inferior direita -->
    <line x1="-50" y1="-35" x2="55" y2="32"/>
    <!-- Lâmina inferior: olho inferior → ponta superior direita -->
    <line x1="-50" y1="35" x2="55" y2="-32"/>
    <!-- Olho superior -->
    <circle cx="-50" cy="-35" r="26" fill="#F2F0E6"/>
    <!-- Olho inferior -->
    <circle cx="-50" cy="35" r="26" fill="#F2F0E6"/>
  </g>

  <!-- Tagline linha 1 -->
  <text x="600" y="350" text-anchor="middle"
        font-family="'Switzer', 'Poppins', 'Inter', system-ui, sans-serif"
        font-size="44" font-weight="600"
        letter-spacing="0" fill="#1A1A1A">
    Tudo que acontece. Só o que importa.
  </text>

  <!-- Tagline linha 2 (italic) -->
  <text x="600" y="410" text-anchor="middle"
        font-family="'Gambarino', 'Iowan Old Style', Georgia, serif"
        font-size="38" font-style="italic" font-weight="400"
        fill="#4A4A4A">
    Em 5 minutos, antes do café.
  </text>

  <!-- URL pill -->
  <rect x="450" y="480" width="300" height="60" rx="30" fill="#1A1A1A"/>
  <text x="600" y="519" text-anchor="middle"
        font-family="'General Sans', 'Poppins', system-ui, sans-serif"
        font-size="24" font-weight="600"
        letter-spacing="2" fill="#F2F0E6">
    recorte.news
  </text>

  <!-- Bottom stripe -->
  <rect width="1200" height="14" y="616" fill="url(#stripe)"/>
</svg>
