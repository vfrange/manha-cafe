name: Deploy Cadastro to GitHub Pages

# Faz deploy automático do public/cadastro.html como index.html no GitHub Pages
# a cada push na main (só quando algo em public/ mudou).
#
# IMPORTANTE: lista explícita do que vai pro ar.
# Arquivos como brandbook.html e instagram-kit.html ficam fora — são ferramentas
# locais de uso interno, não devem ser expostos publicamente.

on:
  push:
    branches: [main]
    paths:
      - 'public/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Preparar dist
        run: |
          mkdir -p dist
          # index.html: landing institucional (página inicial em recorte.news/)
          cp public/index.html dist/index.html
          # cadastro.html: página de cadastro
          cp public/cadastro.html dist/cadastro.html
          # manage.html: página de preferências
          cp public/manage.html dist/manage.html
          # sobre.html: manifesto + visão + missão + como funciona
          cp public/sobre.html dist/sobre.html
          # faq.html: perguntas frequentes
          cp public/faq.html dist/faq.html
          # feedback.html: confirmação dos botões +/- e pausar tema
          cp public/feedback.html dist/feedback.html
          # termos.html: termos de uso (legal)
          cp public/termos.html dist/termos.html
          # politica-privacidade.html: LGPD
          cp public/politica-privacidade.html dist/politica-privacidade.html
          # unsubscribed.html: confirmação de cancelamento de inscrição
          cp public/unsubscribed.html dist/unsubscribed.html
          # admin.html: dashboard interno (auth via ?key=)
          cp public/admin.html dist/admin.html
          # arquivo.html: edições anteriores públicas
          cp public/arquivo.html dist/arquivo.html
          # og-default.svg: imagem padrão de Open Graph (preview em WhatsApp/Twitter/etc)
          cp public/og-default.svg dist/og-default.svg
          # 404 fallback redireciona pro index
          echo '<!DOCTYPE html><meta http-equiv="refresh" content="0; url=/">' > dist/404.html
          # Log do que foi para deploy (visível nos Actions)
          echo "=== Arquivos no dist/ ==="
          ls -la dist/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
