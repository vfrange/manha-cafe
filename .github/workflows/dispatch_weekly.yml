name: Dispatch Weekly

# Sábado 8h BRT. Lê fila do prepare_weekly e envia.

on:
  schedule:
    - cron: '0 11 * * 6'   # 08:00 BRT
    - cron: '5 11 * * 6'   # 08:05 BRT (fallback 1)
    - cron: '10 11 * * 6'  # 08:10 BRT (fallback 2)
    - cron: '20 11 * * 6'  # 08:20 BRT (fallback 3)
  workflow_dispatch:

jobs:
  dispatch:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt
      - name: Install deps
        working-directory: scripts
        run: pip install -r requirements.txt
      - name: Dispatch weekly
        working-directory: scripts
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
          DISPATCH_WORKERS: '10'
        run: python dispatch_emails.py --kind weekly
