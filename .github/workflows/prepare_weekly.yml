name: Prepare Weekly

# Sábado: prepara o Recorte da Semana pra disparar às 8h BRT.

on:
  schedule:
    - cron: '0 9 * * 6'    # 06:00 BRT
    - cron: '30 9 * * 6'   # 06:30 BRT (fallback 1)
    - cron: '0 10 * * 6'   # 07:00 BRT (fallback 2)
    - cron: '30 10 * * 6'  # 07:30 BRT (fallback 3)
  workflow_dispatch:

jobs:
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt
      - name: Install deps
        working-directory: scripts
        run: pip install -r requirements.txt
      - name: Run prepare_weekly
        working-directory: scripts
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          FEEDBACK_SECRET: ${{ secrets.FEEDBACK_SECRET }}
          FEEDBACK_BASE_URL: ${{ secrets.FEEDBACK_BASE_URL }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
          MANAGE_URL: ${{ secrets.MANAGE_URL }}
          PARALLEL_WORKERS: '5'
        run: python prepare_weekly.py
