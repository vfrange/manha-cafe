# ⚠️ DESCONTINUADO — substituído pelo pipeline prepare_weekly.yml + dispatch_weekly.yml.
# Mantido aqui só pra histórico e disparo manual. NÃO tem cron schedule.

name: "[DEPRECATED] Recorte da Semana"

on:
  workflow_dispatch:

jobs:
  weekly:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        working-directory: scripts
        run: pip install -r requirements.txt

      - name: Run Recorte da Semana
        working-directory: scripts
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          FEEDBACK_BASE_URL: ${{ secrets.FEEDBACK_BASE_URL }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
          MANAGE_URL: ${{ secrets.MANAGE_URL }}
          FEEDBACK_SECRET: ${{ secrets.FEEDBACK_SECRET }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: python weekly_recorte.py
