name: Prepare Daily

# Roda de madrugada (seg-sex) e prepara os emails pra serem disparados
# pelo dispatch_daily.yml às 6h BRT em ponto.
#
# Cron em UTC (GitHub Actions usa UTC). BRT = UTC-3.

on:
  schedule:
    - cron: '0 7 * * 1-5'    # 04:00 BRT
    - cron: '30 7 * * 1-5'   # 04:30 BRT (fallback 1)
    - cron: '0 8 * * 1-5'    # 05:00 BRT (fallback 2)
    - cron: '30 8 * * 1-5'   # 05:30 BRT (fallback 3 — última chance antes do dispatch 6h)
  workflow_dispatch:

jobs:
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt
      - name: Install deps
        working-directory: scripts
        run: pip install -r requirements.txt
      - name: Run prepare_daily
        working-directory: scripts
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          FEEDBACK_SECRET: ${{ secrets.FEEDBACK_SECRET }}
          FEEDBACK_BASE_URL: ${{ secrets.FEEDBACK_BASE_URL }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
          MANAGE_URL: ${{ secrets.MANAGE_URL }}
          PARALLEL_WORKERS: '5'
        run: python prepare_daily.py
