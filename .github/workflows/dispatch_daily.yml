name: Dispatch Daily

# Seg-Sex 6h BRT (com 3 fallbacks). Lê fila do prepare_daily e envia.

on:
  schedule:
    - cron: '0 9 * * 1-5'    # 06:00 BRT
    - cron: '0 10 * * 1-5'   # 07:00 BRT (fallback 1)
    - cron: '0 11 * * 1-5'   # 08:00 BRT (fallback 2)
  workflow_dispatch:

jobs:
  dispatch:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt
      - name: Install deps
        working-directory: scripts
        run: pip install -r requirements.txt
      - name: Dispatch daily
        working-directory: scripts
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
          FEEDBACK_SECRET: ${{ secrets.FEEDBACK_SECRET }}
          MANAGE_URL: ${{ secrets.MANAGE_URL }}
          DISPATCH_WORKERS: '10'
        run: python dispatch_emails.py --kind daily
